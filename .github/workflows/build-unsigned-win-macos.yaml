name: Build Unsigned Kenku FM (Windows + macOS)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - custom-build-*
      - custom-build/**

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "yarn"

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn Classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --non-interactive --frozen-lockfile

      - name: Build package
        run: yarn make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kenku-fm-${{ matrix.os }}
          path: out/make/**/*
          if-no-files-found: error
